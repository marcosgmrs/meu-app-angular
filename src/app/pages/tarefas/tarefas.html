<h2>Tarefas da API</h2>

<p>Total de tarefas: {{ todos().length }}</p>

@for (todo of todos(); track todo.id) {
  <div class="todo-item">
    <span>{{ todo.title }}</span>
    @if (todo.completed) {
      <span>✅</span>
    } @else {
      <span>⏳</span>
    }
  </div>
}

<a routerLink="/">Voltar</a>
