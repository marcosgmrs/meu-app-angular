<h1>Meu App Angular</h1>

<div class="contador">
  <p>Cliques: {{ contador }}</p>
  <button (click)="incrementar()">Clique aqui</button>

  @if (contador > 5) {
    <p>Você clicou mais de 5 vezes!</p>
  }

  @if (contador > 10) {
    <p>Mais de 10 cliques, uau!</p>
  }
</div>

@for (pessoa of pessoas; track pessoa.nome) {
  <app-card
    [nome]="pessoa.nome"
    [cargo]="pessoa.cargo"
    [cidade]="pessoa.cidade">
  </app-card>
}
